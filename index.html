<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div class="background"></div>

  <div class="container">

    <div id="creator-box">
      <h1 class="gradient-text">Create Birthday Surprise 🎁</h1>

      <input type="text" id="nameInput" placeholder="Enter Birthday Person Name">

      <button id="generateBtn">Generate Link 🎉</button>

      <!-- GENERATED LINK BOX -->
      <div id="linkBox" style="margin-top:20px; display:none;">
        
        <input id="generatedLink" readonly 
          style="width:100%; padding:12px; border-radius:10px; border:none;">

        <button id="copyBtn" style="margin-top:10px;">
          📋 Copy Link
        </button>

      </div>
    </div>

    <div id="wish-box" class="hidden">

      <div class="countdown" id="countdown">3</div>

      <h1 id="birthdayText"></h1>

      <p id="typing"></p>

    </div>

  </div>

  <!-- Balloons -->
  <div class="balloons">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Music -->
  <audio id="music" loop>
    <source id="musicSource" src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
